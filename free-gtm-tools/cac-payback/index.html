<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CAC Payback Calculator</title><meta name="description" content="Calculate CAC payback period, LTV/CAC, and SaaS growth efficiency."><link rel="canonical" href="https://arafen.pages.dev/free-gtm-tools/cac-payback/"><link rel="icon" href="/favicon.png"><style>body{font-family:Arial;background:#050810;color:#e2e8f0;margin:0}nav{position:fixed;top:0;width:100%;background:#050810;padding:16px 6%;border-bottom:1px solid rgba(255,255,255,.08)}main{padding:120px 6%;max-width:800px;margin:auto}input{display:block;margin:10px 0;padding:10px;width:100%}button{padding:10px;margin-top:10px}</style></head><body><nav>Free GTM Tools</nav><main><h1>CAC Payback Calculator</h1><input id="cac" placeholder="CAC"><input id="rev" placeholder="Monthly Revenue"><input id="margin" placeholder="Gross Margin %"><button onclick="calc()">Calculate</button><h2 id="result"></h2></main><script>function calc(){let cac=+cac.value,rev=+rev.value,margin=+margin.value/100;let payback=cac/(rev*margin);result.innerText='Payback: '+payback.toFixed(1)+' months'}</script></body></html>
