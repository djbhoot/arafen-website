backend:
  name: github
  repo: djbhoot/arafen-website
  branch: decap-11ty-migration
  base_url: https://sveltia-oauth.arafen-shovon.workers.dev

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
      - { label: "Layout Tag", name: "tags", widget: "hidden", default: "blog" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "description", widget: "text" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - { label: "Featured Image Alt Text", name: "featuredImageAlt", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Tags", name: "postTags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "homepage"
    label: "Homepage"
    files:
      - name: "homepage"
        label: "Homepage Content"
        file: "src/_data/homepage.yml"
        fields:
          - { label: "Hero Eyebrow", name: "heroEyebrow", widget: "string", required: false }
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Primary CTA Text", name: "primaryCtaText", widget: "string" }
          - { label: "Primary CTA URL", name: "primaryCtaUrl", widget: "string" }
          - { label: "Secondary CTA Text", name: "secondaryCtaText", widget: "string", required: false }
          - { label: "Secondary CTA URL", name: "secondaryCtaUrl", widget: "string", required: false }
          - { label: "About Title", name: "aboutTitle", widget: "string" }
          - { label: "About Text", name: "aboutText", widget: "text" }

  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "General Site Settings"
        file: "src/_data/site.yml"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Site URL", name: "siteUrl", widget: "string" }
          - { label: "Default SEO Title", name: "defaultSeoTitle", widget: "string" }
          - { label: "Default Meta Description", name: "defaultMetaDescription", widget: "text" }
          - { label: "Author Name", name: "authorName", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }

  - name: "tools"
    label: "Free Tools"
    folder: "src/tools"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "description", widget: "text" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Tool Category", name: "category", widget: "string", required: false }
      - { label: "CTA Text", name: "ctaText", widget: "string", required: false }
      - { label: "CTA URL", name: "ctaUrl", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "resources"
    label: "Resources"
    folder: "src/resources"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false }
      - { label: "Meta Description", name: "description", widget: "text" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Resource Type", name: "resourceType", widget: "select", options: ["Tool", "Template", "Checklist", "Guide", "Calculator"] }
      - { label: "Body", name: "body", widget: "markdown" }
